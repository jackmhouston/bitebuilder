<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiteBuilder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css', v=asset_version) }}">
  </head>
  <body data-page="{{ page_key }}">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand-lockup" href="{{ url_for('index') }}">
          <strong>BiteBuilder</strong>
        </a>
      </header>

      <nav class="step-indicator" aria-label="Workflow steps">
        {% for step in steps %}
          <a
            class="step-link{% if step.active %} active{% endif %}{% if step.complete %} complete{% endif %}"
            href="{{ step.path }}"
            data-step-link="{{ step.key }}"
          >
            <span class="step-index">{{ loop.index }}</span>
            <span class="step-label">{{ step.label }}</span>
          </a>
        {% endfor %}
      </nav>

      <main class="main-stage">
        <h1>{{ page_title }}</h1>

        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="{{ url_for('static', filename='app.js', v=asset_version) }}"></script>
  </body>
</html>
