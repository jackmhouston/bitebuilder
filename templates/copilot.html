{% extends "base.html" %}

{% block content %}
  <div class="panel-grid">
    <section class="panel panel-span-7">
      <div class="section-head">
        <h2>Chat</h2>
      </div>

      <div id="chatLog" class="chat-log">
        <div class="chat-empty">No chat yet.</div>
      </div>

      <label>
        <span>Message</span>
        <textarea id="chatInput" rows="4" placeholder="What is the strongest hook for this project and what should it pivot into?"></textarea>
      </label>

      <div class="actions">
        <button id="chatButton" class="button" type="button">Send</button>
        <a class="button button-secondary" href="{{ url_for('project_brief') }}">Back</a>
        <a id="continueFromChatButton" class="button button-ghost" href="{{ url_for('project_generate') }}">Continue</a>
        <button id="clearChatButton" class="button button-link" type="button">Clear</button>
      </div>

      <div class="status-box" data-page-status>
        Ask a question.
      </div>
    </section>

    <section class="panel panel-span-5">
      <div class="section-head">
        <h2>Model</h2>
      </div>

      <label>
        <span>Model</span>
        <select id="modelSelect"></select>
      </label>

      <div class="actions">
        <button id="checkModelsButton" class="button button-secondary" type="button">Check local models</button>
      </div>

      <p data-model-status>Models not checked.</p>

      <label>
        <span>Thinking mode</span>
        <select id="thinkingModeSelect">
          <option value="auto">Auto</option>
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </label>

      <label>
        <span>Timeout (seconds)</span>
        <input id="timeoutInput" type="number" min="30" max="600" value="180">
      </label>

      <div class="stats-grid compact-stats">
        <article class="stat-card">
          <span>Transcript</span>
          <strong data-bind="transcriptName">No transcript loaded</strong>
        </article>
      </div>

      <div class="summary-grid single-column">
        <article class="summary-card">
          <span>Brief</span>
          <p data-bind="briefPreview">No brief yet.</p>
        </article>
      </div>

      <div class="section-head">
        <h2>Suggestion</h2>
      </div>
      <div id="suggestedPlan" class="results"></div>

      <div class="section-head">
        <h2>Keep for generate</h2>
      </div>
      <div id="acceptedPlan" class="results"></div>
    </section>
  </div>
{% endblock %}
